<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MapSaved</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="map" class="map-canvas"></section>

    <header class="glass topbar">
      <div>
        <h1>MapSaved</h1>
        <p class="subtitle">Mappa smart con stile moderno e focus sui tuoi spot</p>
      </div>
      <div class="topbar-actions">
        <button id="togglePanelBtn">Pannello</button>
        <button id="newPlaceBtn" class="primary">+ Nuovo luogo</button>
      </div>
    </header>

    <aside id="controlPanel" class="glass control-panel">
      <section class="filters">
        <input id="searchInput" placeholder="Cerca luogo o nota..." />
        <select id="exploredFilter"><option value="">Tutti</option><option value="false">Da esplorare</option><option value="true">Esplorati</option></select>
        <select id="sortBy"><option value="updated">Più recenti</option><option value="distance">Più vicini</option><option value="overall">Voto generale</option><option value="priority">Priorità</option></select>
      </section>
      <section class="stats" id="stats"></section>
      <section id="list" class="list"></section>
    </aside>

    <dialog id="placeDialog">
      <form id="placeForm" method="dialog">
        <h2 id="dialogTitle">Nuovo luogo</h2>
        <p class="help">Per aggiungere un luogo inserisci <b>coordinate</b> oppure <b>link Google Maps</b>.</p>
        <p id="formError" class="error"></p>
        <input type="hidden" id="placeId" />
        <label>Nome<input id="name" required /></label>
        <label>Coordinate (decimali o DMS)
          <input id="coordinateInput" placeholder='Es: 44.429930, 8.917107 oppure 44°25\'48.7"N 8°55\'04.4"E' />
        </label>
        <label>Link Google Maps (anche maps.app.goo.gl)
          <input id="googleMapsUrl" placeholder="https://maps.app.goo.gl/..." />
        </label>
        <button type="button" id="extractCoordsBtn">Estrai coordinate dal link</button>
        <label>Note<textarea id="notes" placeholder="Parcheggio, recinzioni, orari, rischi..."></textarea></label>
        <label>Priorità
          <select id="priority"><option value="high">Alta</option><option value="medium" selected>Media</option><option value="low">Bassa</option></select>
        </label>
        <fieldset>
          <legend>Voti (1-10)</legend>
          <label>Generale<input id="overall" type="range" min="1" max="10" value="5" /></label>
          <label>Fattibilità<input id="access" type="range" min="1" max="10" value="5" /></label>
          <label>Integrità<input id="integrity" type="range" min="1" max="10" value="5" /></label>
          <label>Notorietà<input id="notoriety" type="range" min="1" max="10" value="5" /></label>
        </fieldset>
        <label><input id="explored" type="checkbox" /> Già esplorato</label>
        <menu><button type="button" id="cancelBtn">Annulla</button><button class="primary" type="submit">Salva</button></menu>
      </form>
    </dialog>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js" type="module"></script>
  </body>
</html>
