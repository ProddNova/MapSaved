<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MapSaved</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>MapSaved</h1>
        <p class="subtitle">Mappa privata per obiettivi urbex imminenti</p>
      </div>
      <button id="newPlaceBtn" class="primary">+ Nuovo</button>
    </header>

    <main class="layout">
      <section class="panel filters">
        <input id="searchInput" placeholder="Cerca luogo o nota..." />
        <select id="exploredFilter">
          <option value="">Tutti</option>
          <option value="false">Da esplorare</option>
          <option value="true">Esplorati</option>
        </select>
        <select id="sortBy">
          <option value="updated">Più recenti</option>
          <option value="distance">Più vicini</option>
          <option value="overall">Voto generale</option>
          <option value="priority">Priorità</option>
        </select>
      </section>

      <section class="stats" id="stats"></section>
      <section id="map" class="panel map"></section>
      <section id="list" class="list"></section>
    </main>

    <dialog id="placeDialog">
      <form id="placeForm" method="dialog">
        <h2 id="dialogTitle">Nuovo luogo</h2>
        <input type="hidden" id="placeId" />
        <label>Nome<input id="name" required /></label>
        <label>Link Google Maps<input id="googleMapsUrl" placeholder="Incolla link condiviso" /></label>
        <button type="button" id="extractCoordsBtn">Estrai coordinate da link</button>
        <div class="coords">
          <label>Latitudine<input id="lat" type="number" step="any" required /></label>
          <label>Longitudine<input id="lng" type="number" step="any" required /></label>
        </div>
        <label>Note<textarea id="notes" placeholder="Parcheggio, recinzioni, orari, rischi..."></textarea></label>
        <label>Priorità
          <select id="priority"><option value="high">Alta</option><option value="medium" selected>Media</option><option value="low">Bassa</option></select>
        </label>
        <fieldset>
          <legend>Voti (1-10)</legend>
          <label>Generale<input id="overall" type="range" min="1" max="10" value="5" /></label>
          <label>Fattibilità<input id="access" type="range" min="1" max="10" value="5" /></label>
          <label>Integrità<input id="integrity" type="range" min="1" max="10" value="5" /></label>
          <label>Notorietà<input id="notoriety" type="range" min="1" max="10" value="5" /></label>
        </fieldset>
        <label><input id="explored" type="checkbox" /> Già esplorato</label>
        <label>Foto (URL, una per riga)<textarea id="photoUrls"></textarea></label>
        <menu><button type="button" id="cancelBtn">Annulla</button><button class="primary" type="submit">Salva</button></menu>
      </form>
    </dialog>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js" type="module"></script>
  </body>
</html>
